name: 🎮 HnHost 每日领取金币

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  claim:
    name: 🪙 执行每日领币
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 拉取私库代码
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/kanezikii/tests/hnhost-claim.spec.js
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 🟢 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 安装依赖
        working-directory: private
        run: npm install undici @playwright/test

      - name: 🌐 安装 Playwright 浏览器
        working-directory: private
        run: npx playwright install chromium --with-deps

      # =========================================
      # 🔥 核心修改：使用 Xray-core 替换旧版 GOST
      # =========================================
      - name: 🛡️ 启动 Xray 代理转发
        env:
          XRAY_CONFIG: ${{ secrets.XRAY_CONFIG }}
        run: |
          # 1. 下载 Xray-core
          XRAY_VERSION=$(curl -s "https://api.github.com/repos/XTLS/Xray-core/releases/latest" | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          echo "📦 Xray 版本: $XRAY_VERSION"
          wget -q "https://github.com/XTLS/Xray-core/releases/download/${XRAY_VERSION}/Xray-linux-64.zip"
          unzip -q Xray-linux-64.zip -d xray_bin
          chmod +x xray_bin/xray
          
          # 2. 将 Secret 中的 JSON 写入配置文件
          echo "$XRAY_CONFIG" > xray_bin/config.json
          
          # 3. 后台启动 Xray
          nohup ./xray_bin/xray -c ./xray_bin/config.json > xray.log 2>&1 &
          
          # 4. 等待 3 秒让 Xray 启动完毕
          sleep 3
          
          # 5. 验证本地 10808 端口是否连通 (测试代理出口 IP)
          curl -s -x socks5://127.0.0.1:10808 https://api.ipify.org \
            | sed 's/\([0-9]*\.[0-9]*\.[0-9]*\.\)[0-9]*/\1xx/g'

      - name: 🚀 运行领币脚本
        working-directory: private
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          TG_BOT:        ${{ secrets.TG_BOT }}
          # 这里的端口必须和 Xray JSON 中 inbound 监听的端口 (10808) 保持一致
          HTTP_PROXY:    socks5://127.0.0.1:10808
          HTTPS_PROXY:   socks5://127.0.0.1:10808
        run: npx playwright test tests/hnhost-claim.spec.js

      - name: 📸 上传失败截图
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: private/test-results/
          retention-days: 7
